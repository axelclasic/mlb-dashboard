<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.P.A. Pro v4.0 - Consenso & Filtro Inteligente</title>
    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-tarjetas: #151f32;
            --bg-interacciones: #222f47;
            --texto-blanco: #f1f5f9;
            --texto-mutado: #64748b;
            --oro-sugerencia: #eab308;
            --verde-exito: #10b981;
            --rojo-error: #ef4444;
            --glow-top5: rgba(16, 185, 129, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--bg-interacciones);
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .btn-refresh {
            background: var(--bg-interacciones);
            color: var(--texto-blanco);
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .panel-rendimiento {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--bg-interacciones);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .panel-rendimiento h3 {
            font-size: 0.85rem;
            color: var(--texto-mutado);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .porcentaje-grande {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--verde-exito);
            line-height: 1;
            margin-bottom: 4px;
        }

        .sub-conteo {
            font-size: 0.8rem;
            color: var(--texto-mutado);
        }

        .seccion-predicciones h2 {
            font-size: 1.05rem;
            margin-bottom: 12px;
            color: var(--texto-blanco);
            font-weight: 600;
        }

        .grid-juegos {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 640px) {
            .grid-juegos {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }

        .card-juego {
            background-color: var(--bg-tarjetas);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid var(--bg-interacciones);
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        /* Diseño Destacado para el Top 5 Seguro */
        .card-juego.top5-premium {
            border: 2px solid var(--verde-exito);
            background: linear-gradient(145deg, #112420 0%, #151f32 100%);
            box-shadow: 0 4px 15px var(--glow-top5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--texto-mutado);
        }

        .badge-sistema {
            background: rgba(234, 179, 8, 0.1);
            color: var(--oro-sugerencia);
            border: 1px solid rgba(234, 179, 8, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
        }

        .badge-top5 {
            background: var(--verde-exito);
            color: #0b0f19;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 0.3px;
        }

        .duelo-equipos {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bloque-sugerencia-automatica {
            margin-top: 5px;
            background: rgba(234, 179, 8, 0.02);
            border: 1px dashed var(--oro-sugerencia);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-juego.top5-premium .bloque-sugerencia-automatica {
            background: rgba(16, 185, 129, 0.02);
            border: 1px dashed var(--verde-exito);
        }

        .info-sugerencia {
            display: flex;
            flex-direction: column;
        }

        .tag-tipo-logro {
            font-size: 0.7rem;
            color: var(--oro-sugerencia);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .card-juego.top5-premium .tag-tipo-logro {
            color: var(--verde-exito);
        }

        .seleccion-texto {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .cuota-valor {
            font-size: 0.85rem;
            font-weight: bold;
            background: var(--oro-sugerencia);
            color: #000000;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .card-juego.top5-premium .cuota-valor {
            background: var(--verde-exito);
            color: #0b0f19;
        }

        .no-data {
            color: var(--texto-mutado);
            font-size: 0.85rem;
            text-align: center;
            padding: 30px 0;
            grid-column: 1 / -1;
        }
        
        .error-texto {
            color: var(--rojo-error);
            font-weight: bold;
            background: rgba(239, 68, 68, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--rojo-error);
        }
    </style>
</head>
<body>

    <header>
        <h1>S.I.P.A. Consensus</h1>
        <button class="btn-refresh" onclick="forzarLimpiezaCompleta()">Sincronizar 🔄</button>
    </header>

    <div class="panel-rendimiento">
        <h3>Efectividad Global de Precisión</h3>
        <div class="porcentaje-grande" id="global-winrate">0%</div>
        <div class="sub-conteo" id="global-conteo">Procesando promedios globales de mercado...</div>
    </div>

    <div class="seccion-predicciones">
        <h2>Pizarra de Pronósticos (Filtro Inteligente -140 a -250)</h2>
        <div class="grid-juegos" id="contenedor-pizarra">
            <p class="no-data" id="texto-carga">Iniciando S.I.P.A v4.0 Pro...</p>
        </div>
    </div>

    <script>
        const API_KEY = 'b55dc1db9b4f0aea7bdd5100a9952c00'; 
        
        const SPORT = 'baseball_mlb';
        const REGIONS = 'us';
        const MARKETS = 'h2h,spreads,totals'; 
        const ODDS_FORMAT = 'american';

        const CACHE_JUEGOS = 'sipa_cache_juegos_v4';
        const CACHE_TIEMPO = 'sipa_cache_timestamp_v4';
        const REGISTRO_PREDICCIONES = 'sipa_sistema_predictions_v4';

        document.addEventListener('DOMContentLoaded', function() {
            iniciarSistema();
        });

        async function iniciarSistema() {
            try {
                const cacheStr = localStorage.getItem(CACHE_JUEGOS);
                const timestamp = localStorage.getItem(CACHE_TIEMPO);
                const ahora = new Date().getTime();

                let cacheValido = false;
                let partidosGuardados = null;

                if (cacheStr && timestamp && (ahora - timestamp < 4 * 60 * 60 * 1000)) {
                    try {
                        partidosGuardados = JSON.parse(cacheStr);
                        cacheValido = true;
                    } catch (e) {
                        cacheValido = false;
                    }
                }

                if (cacheValido && partidosGuardados) {
                    procesarConsensoMercado(partidosGuardados);
                    verificarResultados();
                } else {
                    await descargarDatos();
                }
                
                actualizarDashboard();
            } catch (error) {
                mostrarFalloSistema("Error al arrancar: " + error.message);
            }
        }

        async function forzarLimpiezaCompleta() {
            const contenedor = document.getElementById('contenedor-pizarra');
            contenedor.innerHTML = '<p class="no-data">Calculando promedios de consenso...</p>';
            localStorage.removeItem(CACHE_JUEGOS);
            localStorage.removeItem(CACHE_TIEMPO);
            await descargarDatos();
            actualizarDashboard();
        }

        async function descargarDatos() {
            const url = `https://api.the-odds-api.com/v4/sports/${SPORT}/odds/?apiKey=${API_KEY}&regions=${REGIONS}&markets=${MARKETS}&oddsFormat=${ODDS_FORMAT}`;
            
            try {
                const respuesta = await fetch(url);
                if (!respuesta.ok) {
                    const datosError = await respuesta.json();
                    throw new Error(datosError.message || "Error al conectar con el servidor de cuotas.");
                }
                const partidos = await respuesta.json();

                if (!partidos || partidos.length === 0) {
                    document.getElementById('contenedor-pizarra').innerHTML = '<p class="no-data">No hay juegos programados para hoy en la MLB.</p>';
                    return;
                }

                localStorage.setItem(CACHE_JUEGOS, JSON.stringify(partidos));
                localStorage.setItem(CACHE_TIEMPO, new Date().getTime().toString());
                
                procesarConsensoMercado(partidos);
                await verificarResultados();
            } catch (error) {
                mostrarFalloSistema(error.message);
            }
        }

        function procesarConsensoMercado(partidos) {
            const contenedor = document.getElementById('contenedor-pizarra');
            contenedor.innerHTML = '';

            let prediccionesStr = localStorage.getItem(REGISTRO_PREDICCIONES);
            let historialPredicciones = prediccionesStr ? JSON.parse(prediccionesStr) : [];
            
            let listaSugerenciasGlobales = [];

            partidos.forEach(partido => {
                if (!partido.bookmakers || partido.bookmakers.length === 0) return;

                // Mapa para calcular los promedios de todas las casas del partido
                let mapaResultados = {};

                partido.bookmakers.forEach(bookmaker => {
                    if (!bookmaker.markets) return;

                    bookmaker.markets.forEach(market => {
                        if (market.key !== 'h2h' && market.key !== 'spreads' && market.key !== 'totals') return;

                        market.outcomes.forEach(out => {
                            let puntoTexto = out.point !== undefined ? out.point : '';
                            let llave = `${market.key}_${out.name}_${puntoTexto}`;

                            if (!mapaResultados[llave]) {
                                let label = '';
                                if (market.key === 'h2h') label = 'Gana Directo (ML)';
                                else if (market.key === 'spreads') label = `Hándicap (${out.point > 0 ? '+' : ''}${out.point})`;
                                else if (market.key === 'totals') label = `Total Carreras (${out.name} ${out.point})`;

                                mapaResultados[llave] = {
                                    market: market.key,
                                    name: out.name,
                                    point: out.point !== undefined ? out.point : '',
                                    label: label,
                                    sumaPrecios: 0,
                                    contadorCasas: 0
                                };
                            }

                            mapaResultados[llave].sumaPrecios += out.price;
                            mapaResultados[llave].contadorCasas++;
                        });
                    });
                });

                // Filtrar las opciones del partido que caen en el "Sweet Spot" (-140 a -250)
                let opcionesValidasJuego = [];
                for (let llave in mapaResultados) {
                    let opt = mapaResultados[llave];
                    let precioPromedio = Math.round(opt.sumaPrecios / opt.contadorCasas);

                    // FILTRO SWEET SPOT: Selecciona cuotas seguras sin caer en extremos improductivos
                    if (precioPromedio <= -140 && precioPromedio >= -250) {
                        opcionesValidasJuego.push({
                            market: opt.market,
                            name: opt.name,
                            point: opt.point,
                            label: opt.label,
                            price: precioPromedio
                        });
                    }
                }

                // Si hay opciones perfectas en el juego, tomamos la de mayor probabilidad (la más negativa)
                if (opcionesValidasJuego.length > 0) {
                    opcionesValidasJuego.sort((a, b) => a.price - b.price);
                    listaSugerenciasGlobales.push({
                        partido: partido,
                        logro: opcionesValidasJuego[0]
                    });
                }
            });

            if (listaSugerenciasGlobales.length === 0) {
                contenedor.innerHTML = '<p class="no-data">Filtro de Precisión Activo: Hoy ningún juego cumple con el rango de seguridad óptimo (-140 a -250) en el consenso general.</p>';
                return;
            }

            // Ordenar de forma global por cuota promedio más segura (las de mayor probabilidad primero)
            listaSugerenciasGlobales.sort((a, b) => a.logro.price - b.logro.price);

            // Pintar tarjetas marcando el Top 5 exclusivo
            listaSugerenciasGlobales.forEach((item, index) => {
                let partido = item.partido;
                let logroSeleccionado = item.logro;
                let esTop5 = (index < 5); 

                let existe = historialPredicciones.some(p => p.gameId === partido.id);
                if (!existe) {
                    historialPredicciones.push({
                        gameId: partido.id,
                        market: logroSeleccionado.market,
                        selection: logroSeleccionado.name,
                        point: logroSeleccionado.point,
                        status: 'pendiente'
                    });
                }

                let fechaObj = new Date(partido.commence_time);
                let horaFormateada = fechaObj.getHours() + ':' + (fechaObj.getMinutes() < 10 ? '0' : '') + fechaObj.getMinutes();

                let htmlTarjeta = `
                    <div class="card-juego ${esTop5 ? 'top5-premium' : ''}">
                        <div class="card-header">
                            <span class="${esTop5 ? 'badge-top5' : 'badge-sistema'}">${esTop5 ? '🔥 TOP 5 SEGURO' : 'CONSENSO GLOBAL'}</span>
                            <span>${horaFormateada}</span>
                        </div>
                        <div class="duelo-equipos">
                            <div>⚾ ${partido.away_team}</div>
                            <div>🏠 ${partido.home_team}</div>
                        </div>
                        <div class="bloque-sugerencia-automatica">
                            <div class="info-sugerencia">
                                <span class="tag-tipo-logro">${logroSeleccionado.label}</span>
                                <span class="seleccion-texto">${logroSeleccionado.name}</span>
                            </div>
                            <div class="cuota-valor">${logroSeleccionado.price} (Avg)</div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += htmlTarjeta;
            });

            localStorage.setItem(REGISTRO_PREDICCIONES, JSON.stringify(historialPredicciones));
        }

        async function verificarResultados() {
            let prediccionesStr = localStorage.getItem(REGISTRO_PREDICCIONES);
            if (!prediccionesStr) return;
            
            let predicciones = JSON.parse(prediccionesStr);
            let hayPendientes = predicciones.some(p => p.status === 'pendiente');

            if (!hayPendientes) return;

            let url = `https://api.the-odds-api.com/v4/sports/${SPORT}/scores/?daysFrom=3&apiKey=${API_KEY}`;
            
            try {
                let respuesta = await fetch(url);
                let scores = await respuesta.json();
                let cambios = false;

                if (!Array.isArray(scores)) return;

                predicciones.forEach(pred => {
                    if (pred.status !== 'pendiente') return;

                    let juego = scores.find(s => s.id === pred.gameId);
                    if (juego && juego.completed && juego.scores) {
                        
                        let homeData = juego.scores.find(s => s.name === juego.home_team);
                        let awayData = juego.scores.find(s => s.name === juego.away_team);
                        
                        let homeScore = homeData ? parseInt(homeData.score) : 0;
                        let awayScore = awayData ? parseInt(awayData.score) : 0;
                        
                        if (pred.market === 'h2h') {
                            let ganadorReal = homeScore > awayScore ? juego.home_team : juego.away_team;
                            pred.status = (pred.selection === ganadorReal) ? 'ganada' : 'perdida';
                            cambios = true;
                        } 
                        else if (pred.market === 'spreads') {
                            let ventaja = parseFloat(pred.point);
                            if (pred.selection === juego.home_team) {
                                pred.status = ((homeScore + ventaja) > awayScore) ? 'ganada' : 'perdida';
                            } else {
                                pred.status = ((awayScore + ventaja) > homeScore) ? 'ganada' : 'perdida';
                            }
                            cambios = true;
                        } 
                        else if (pred.market === 'totals') {
                            let carrerasTotales = homeScore + awayScore;
                            let lineaFija = parseFloat(pred.point);
                            if (pred.selection.toLowerCase() === 'over') {
                                pred.status = (carrerasTotales > lineaFija) ? 'ganada' : 'perdida';
                            } else if (pred.selection.toLowerCase() === 'under') {
                                pred.status = (carrerasTotales < lineaFija) ? 'ganada' : 'perdida';
                            }
                            cambios = true;
                        }
                    }
                });

                if (cambios) {
                    localStorage.setItem(REGISTRO_PREDICCIONES, JSON.stringify(predicciones));
                    actualizarDashboard();
                }
            } catch (e) {
                cons
