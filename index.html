<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.P.A. - MLB AI Predictor</title>
    <style>
        /* ==========================================
           DISEÑO PREMIUM OSCURO Y RESPONSIVO
           ========================================== */
        :root {
            --bg-principal: #0b0f19;
            --bg-tarjetas: #151f32;
            --bg-interacciones: #222f47;
            --texto-blanco: #f1f5f9;
            --texto-mutado: #64748b;
            --oro-sugerencia: #eab308;
            --verde-exito: #10b981;
            --rojo-error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--bg-interacciones);
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .btn-refresh {
            background: var(--bg-interacciones);
            color: var(--texto-blanco);
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Panel Superior de Rendimiento Automático */
        .panel-rendimiento {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--bg-interacciones);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .panel-rendimiento h3 {
            font-size: 0.85rem;
            color: var(--texto-mutado);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .porcentaje-grande {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--verde-exito);
            line-height: 1;
            margin-bottom: 4px;
        }

        .sub-conteo {
            font-size: 0.8rem;
            color: var(--texto-mutado);
        }

        /* Sección de Pizarra de Sugerencias */
        .seccion-predicciones h2 {
            font-size: 1.05rem;
            margin-bottom: 12px;
            color: var(--texto-blanco);
            font-weight: 600;
        }

        .grid-juegos {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 640px) {
            .grid-juegos {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }

        /* Tarjeta de Juego */
        .card-juego {
            background-color: var(--bg-tarjetas);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid transparent;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--texto-mutado);
        }

        .badge-sistema {
            background: rgba(234, 179, 8, 0.1);
            color: var(--oro-sugerencia);
            border: 1px solid rgba(234, 179, 8, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .duelo-equipos {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Contenedor del Logro Sugerido de Forma Automática */
        .bloque-sugerencia-automatica {
            margin-top: 5px;
            background: rgba(234, 179, 8, 0.04);
            border: 1px dashed var(--oro-sugerencia);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-sugerencia {
            display: flex;
            flex-direction: column;
        }

        .tag-tipo-logro {
            font-size: 0.7rem;
            color: var(--oro-sugerencia);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .seleccion-texto {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .cuota-valor {
            font-size: 0.85rem;
            font-weight: bold;
            background: var(--oro-sugerencia);
            color: #000000;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .no-data {
            color: var(--texto-mutado);
            font-size: 0.85rem;
            text-align: center;
            padding: 30px 0;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <h1>S.I.P.A. MLB</h1>
        <button class="btn-refresh" onclick="forzarActualizacionCompleta()">Sincronizar 🔄</button>
    </header>

    <div class="panel-rendimiento">
        <h3>Efectividad Actual del Algoritmo</h3>
        <div class="porcentaje-grande" id="global-winrate">0%</div>
        <div class="sub-conteo" id="global-conteo">0 Sugerencias Acertadas / 0 Evaluadas</div>
    </div>

    <div class="seccion-predicciones">
        <h2>Sugerencias de Alta Probabilidad (Hoy)</h2>
        <div class="grid-juegos" id="contenedor-pizarra">
            <p class="no-data">Analizando bases de datos...</p>
        </div>
    </div>

    <script>
        // ========================================================
        // CONFIGURACIÓN E INTEGRACIÓN DE TU API DE ODDS
        // ========================================================
        const API_KEY = 'b55dc1db9b4f0aea7bdd5100a9952c00'; // <-- REEMPLAZA CON TU API KEY REAL
        
        const SPORT = 'baseball_mlb';
        const REGIONS = 'us';
        const MARKETS = 'h2h,spreads,totals';
        const ODDS_FORMAT = 'american';

        // Llaves para LocalStorage
        const CACHE_JUEGOS = 'sipa_cache_juegos';
        const CACHE_TIEMPO = 'sipa_cache_timestamp';
        const REGISTRO_PREDICCIONES = 'sipa_sistema_predictions';

        document.addEventListener('DOMContentLoaded', () => {
            ejecutarFlujoPredicciones();
        });

        async function ejecutarFlujoPredicciones() {
            const cache = localStorage.getItem(CACHE_JUEGOS);
            const timestamp = localStorage.getItem(CACHE_TIEMPO);
            const ahora = new Date().getTime();

            // Ahorro automático de créditos: Usar caché si tiene menos de 12 horas
            if (cache && timestamp && (ahora - timestamp < 12 * 60 * 60 * 1000)) {
                console.log("Cargando datos de partidos desde almacenamiento local.");
                procesarYFiltrarMejoresOpciones(JSON.parse(cache));
                verificarYCalcularResultados();
            } else {
                await descargarNuevosDatosDeMercado();
            }
            renderizarDashboardEfectividad();
        }

        async function forzarActualizacionCompleta() {
            localStorage.removeItem(CACHE_TIEMPO);
            await descargarNuevosDatosDeMercado();
            renderizarDashboardEfectividad();
        }

        async function descargarNuevosDatosDeMercado() {
            // Entorno de contingencia/demo si no se ha configurado la API Key
            if (API_KEY === 'TU_API_KEY_AQUÍ' || API_KEY === '') {
                const datosSimulados = obtenerPizarraSimulada();
                localStorage.setItem(CACHE_JUEGOS, JSON.stringify(datosSimulados));
                localStorage.setItem(CACHE_TIEMPO, new Date().getTime().toString());
                procesarYFiltrarMejoresOpciones(datosSimulados);
                inyectarResultadosDemoPrevios(); // Simulación para poblar el panel histórico inicial
                return;
            }

            const url = `https://api.the-odds-api.com/v4/sports/${SPORT}/odds/?apiKey=${API_KEY}&regions=${REGIONS}&markets=${MARKETS}&oddsFormat=${ODDS_FORMAT}`;
            
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Error de red");
                const partidos = await res.json();

                localStorage.setItem(CACHE_JUEGOS, JSON.stringify(partidos));
                localStorage.setItem(CACHE_TIEMPO, new Date().getTime().toString());
                
                procesarYFiltrarMejoresOpciones(partidos);
                await verificarYCalcularResultados();
            } catch (err) {
                console.error("Error al consultar API:", err);
                procesarYFiltrarMejoresOpciones(obtenerPizarraSimulada());
            }
        }

        // ========================================================
        // ALGORITMO DE SELECCIÓN INTELIGENTE (OPCIÓN 1: SEGURO / FAVORITO)
        // ========================================================
        function procesarYFiltrarMejoresOpciones(partidos) {
            const contenedor = document.getElementById('contenedor-pizarra');
            contenedor.innerHTML = '';

            if(!partidos || partidos.length === 0) {
                contenedor.innerHTML = '<p class="no-data">No hay partidos de MLB calendarizados para hoy.</p>';
                return;
            }

            let prediccionesAutoGuardar = JSON.parse(localStorage.getItem(REGISTRO_PREDICCIONES) || '[]');

            partidos.forEach(partido => {
                const bookmaker = partido.bookmakers.find(b => b.key === 'draftkings') || partido.bookmakers[0];
                if (!bookmaker) return;

                let listaOpcionesCandidatas = [];

                // 1. Analizar Moneyline (Buscar favorito pesado)
                const h2h = bookmaker.markets.find(m => m.key === 'h2h');
                if (h2h) {
                    h2h.outcomes.forEach(out => {
                        if (out.price < 0) { // Indica que es favorito en cuota americana (ej: -180)
                            listaOpcionesCandidatas.push({ market: 'h2h', name: out.name, price: out.price, point: '' });
                        }
                    });
                }

                // 2. Analizar Spreads / Runline (Buscar ventajas colchón +1.5 de los Underdogs favoritos por cuota)
                const spreads = bookmaker.markets.find(m => m.key === 'spreads');
                if (spreads) {
                    spreads.outcomes.forEach(out => {
                        if (out.point > 0 && out.price < -140) { // Ejemplo: Ventaja de +1.5 segura con pago razonable
                            listaOpcionesCandidatas.push({ market: 'spreads', name: out.name, price: out.price, point: out.point });
                        }
                    });
                }

                // Si no se encontraron favoritos marcados, tomar el Moneyline con menor riesgo disponible
                if(listaOpcionesCandidatas.length === 0 && h2h) {
                    const menorRiesgo = h2h.outcomes.reduce((prev, current) => (prev.price < current.price) ? prev : current);
                    listaOpcionesCandidatas.push({ market: 'h2h', name: menorRiesgo.name, price: menorRiesgo.price, point: '' });
                }

                // ORDENAR: El algoritmo elige la opción con el número americano más negativo (mayor probabilidad implícita)
                listaOpcionesCandidatas.sort((a, b) => a.price - b.price);
                const mejorLogroSeguro = listaOpcionesCandidatas[0];

                // Auto-registrar en el historial de evaluación en segundo plano si no existe
                if (!prediccionesAutoGuardar.some(p => p.gameId === partido.id)) {
                    prediccionesAutoGuardar.push({
                        gameId: partido.id,
                        market: mejorLogroSeguro.market,
                        selection: mejorLogroSeguro.name,
                        point: mejorLogroSeguro.point,
                        status: 'pendiente',
                        fecha: new Date().toISOString().split('T')[0]
                    });
                }

                // Renderizar tarjeta con la recomendación única fija
                const markup = `
                    <div class="card-juego">
                        <div class="card-header">
                            <span class="badge-sistema">SELECCIÓN IA</span>
                            <span>${new Date(partido.commence_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="duelo-equipos">
                            <div>⚾ ${partido.away_team}</div>
                            <div>🏠 ${partido.home_team}</div>
                        </div>
                        <div class="bloque-sugerencia-automatica">
                            <div class="info-sugerencia">
                                <span class="tag-tipo-logro">${mejorLogroSeguro.market === 'h2h' ? 'Gana Directo (ML)' : 'Hándicap Seguro (RL)'}</span>
                                <span class="seleccion-texto">${mejorLogroSeguro.name} ${mejorLogroSeguro.point > 0 ? '+' + mejorLogroSeguro.point : mejorLogroSeguro.point}</span>
                            </div>
                            <div class="cuota-valor">${mejorLogroSeguro.price > 0 ? '+' + mejorLogroSeguro.price : mejorLogroSeguro.price}</div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += markup;
            });

            localStorage.setItem(REGISTRO_PREDICCIONES, JSON.stringify(prediccionesAutoGuardar));
        }

        // ========================================================
        // EVALUACIÓN AUTOMÁTICA DE LOGROS SUGERIDOS
        // ========================================================
        async function verificarYCalcularResultados() {
            if (API_KEY === 'TU_API_KEY_AQUÍ' || API_KEY === '') return;

            let predicciones = JSON.parse(localStorage.getItem(REGISTRO_PREDICCIONES) || '[]');
            const pendientes = predicciones.filter(p => p.status === 'pendiente');
            if (pendientes.length === 0) return;

            const url_scores = `https://api.the-odds-api.com/v4/sports/${SPORT}/scores/?daysFrom=3&apiKey=${API_KEY}`;
            
            try {
                const respuesta = await fetch(url_scores);
                const scoresRealetime = await respuesta.json();
                let cambiosEfectuados = false;

                pendientes.forEach(pred => {
                    const resultadoJuego = scoresRealetime.find(s => s.id === pred.gameId);
                    if (resultadoJuego && resultadoJuego.completed) {
                        const homeScore = parseInt(resultadoJuego.scores.find(s => s.name === resultadoJuego.home_team)?.score || 0);
                        const awayScore = parseInt(resultadoJuego.scores.find(s => s.name === resultadoJuego.away_team)?.score || 0);
                        let acertoAlgoritmo = false;

                        if (pred.market === 'h2h') {
                            const ganadorReal = homeScore > awayScore ? resultadoJuego.home_team : resultadoJuego.away_team;
                            acertoAlgoritmo = pred.selection === ganadorReal;
                        } 
                        else if (pred.market === 'spreads') {
                            const ventaja = parseFloat(pred.point);
                            if (pred.selection === resultadoJuego.home_team) {
                                acertoAlgoritmo = (homeScore + ventaja) > awayScore;
                            } else {
                                acertoAlgoritmo = (awayScore + ventaja) > homeScore;
                            }
                        }

                        pred.status = acertoAlgoritmo ? 'ganada' : 'perdida';
                        cambiosEfectuados = true;
                    }
                });

                if (cambiosEfectuados) {
                    localStorage.setItem(REGISTRO_PREDICCIONES, JSON.stringify(predicciones));
                    renderizarDashboardEfectividad();
                }
            } catch (e) {
                console.error("Error en auditoría automatizada:", e);
            }
        }

        function renderizarDashboardEfectividad() {
            const data = localStorage.getItem(REGISTRO_PREDICCIONES);
            const contenedorPorcentaje = document.getElementById('global-winrate');
            const contenedorConteo = document.getElementById('global-conteo');

            if (!data) {
                contenedorPorcentaje.innerText = "0%";
                contenedorConteo.innerText = "0 Sugerencias Acertadas / 0 Evaluadas";
                return;
            }

            const historial = JSON.parse(data);
            const evaluadas = historial.filter(p => p.status !== 'pendiente');
            const acertadas = evaluadas.filter(p => p.status === 'ganada').length;
            
            const total = evaluadas.length;
            const winRate = total > 0 ? Math.round((acertadas / total) * 100) : 0;

            contenedorPorcentaje.innerText = `${winRate}%`;
            contenedorConteo.innerText = `${acertadas} Sugerencias Acertadas / ${total} Evaluadas`;

            if (winRate >= 65) contenedorPorcentaje.style.color = 'var(--verde-exito)';
            else if (winRate >= 50) contenedorPorcentaje.style.color = 'var(--oro-sugerencia)';
            else if (total > 0) contenedorPorcentaje.style.color = 'var(--rojo-error)';
        }

        // SIMULACIONES DE RESPALDO (MODO DEMO)
        function inyectarResultadosDemoPrevios() {
            let historial = JSON.parse(localStorage.getItem(REGISTRO_PREDICCIONES) || '[]');
            // Si está vacío, le inyectamos un récord de muestra realista para ilustrar el funcionamiento autónomo
            if(historial.filter(p => p.status !== 'pendiente').length === 0) {
                const baseSimulada = [
                    { gameId: "hist-1", market: "h2h", selection: "New York Yankees", point: "", status: "ganada" },
                    { gameId: "hist-2", market: "spreads", selection: "Los Angeles Dodgers", point: "1.5", status: "ganada" },
                    { gameId: "hist-3", market: "h2h", selection: "Houston Astros", point: "", status: "perdida" },
                    { gameId: "hist-4", market: "spreads", selection: "Boston Red Sox", point: "1.5", status: "ganada" }
                ];
                localStorage.setItem(REGISTRO_PREDICCIONES, JSON.stringify([...historial, ...baseSimulada]));
                renderizarDashboardEfectividad();
            }
        }

        function obtenerPizarraSimulada() {
            return [
                {
                    id: "mlb-realtime-mock-1",
                    home_team: "New York Yankees",
                    away_team: "Boston Red Sox",
                    commence_time: new Date().toISOString(),
                    bookmakers: [{
                        key: "draftkings",
                        markets: [
                            { key: "h2h", outcomes: [{ name: "New York Yankees", price: -190 }, { name: "Boston Red Sox", price: +160 }] },
                            { key: "spreads", outcomes: [{ name: "New York Yankees",
