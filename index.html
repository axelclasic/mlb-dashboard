<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.P.A. - MLB AI Predictor</title>
    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-tarjetas: #151f32;
            --bg-interacciones: #222f47;
            --texto-blanco: #f1f5f9;
            --texto-mutado: #64748b;
            --oro-sugerencia: #eab308;
            --verde-exito: #10b981;
            --rojo-error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--bg-interacciones);
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .btn-refresh {
            background: var(--bg-interacciones);
            color: var(--texto-blanco);
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .panel-rendimiento {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--bg-interacciones);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .panel-rendimiento h3 {
            font-size: 0.85rem;
            color: var(--texto-mutado);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .porcentaje-grande {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--verde-exito);
            line-height: 1;
            margin-bottom: 4px;
        }

        .sub-conteo {
            font-size: 0.8rem;
            color: var(--texto-mutado);
        }

        .seccion-predicciones h2 {
            font-size: 1.05rem;
            margin-bottom: 12px;
            color: var(--texto-blanco);
            font-weight: 600;
        }

        .grid-juegos {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 640px) {
            .grid-juegos {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }

        .card-juego {
            background-color: var(--bg-tarjetas);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid transparent;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--texto-mutado);
        }

        .badge-sistema {
            background: rgba(234, 179, 8, 0.1);
            color: var(--oro-sugerencia);
            border: 1px solid rgba(234, 179, 8, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .duelo-equipos {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bloque-sugerencia-automatica {
            margin-top: 5px;
            background: rgba(234, 179, 8, 0.04);
            border: 1px dashed var(--oro-sugerencia);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-sugerencia {
            display: flex;
            flex-direction: column;
        }

        .tag-tipo-logro {
            font-size: 0.7rem;
            color: var(--oro-sugerencia);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .seleccion-texto {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .cuota-valor {
            font-size: 0.85rem;
            font-weight: bold;
            background: var(--oro-sugerencia);
            color: #000000;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .no-data {
            color: var(--texto-mutado);
            font-size: 0.85rem;
            text-align: center;
            padding: 30px 0;
            grid-column: 1 / -1;
        }
        
        .error-texto {
            color: var(--rojo-error);
            font-weight: bold;
            background: rgba(239, 68, 68, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--rojo-error);
        }
    </style>
</head>
<body>

    <header>
        <h1>S.I.P.A. MLB</h1>
        <button class="btn-refresh" onclick="forzarLimpiezaCompleta()">Sincronizar 🔄</button>
    </header>

    <div class="panel-rendimiento">
        <h3>Efectividad Actual del Algoritmo</h3>
        <div class="porcentaje-grande" id="global-winrate">0%</div>
        <div class="sub-conteo" id="global-conteo">Evaluando sistema...</div>
    </div>

    <div class="seccion-predicciones">
        <h2>Sugerencias de Alta Probabilidad (Hoy)</h2>
        <div class="grid-juegos" id="contenedor-pizarra">
            <p class="no-data" id="texto-carga">Iniciando S.I.P.A v2.0...</p>
        </div>
    </div>

    <script>
        // API KEY INCRUSTADA DIRECTAMENTE
        const API_KEY = 'b55dc1db9b4f0aea7bdd5100a9952c00'; 
        
        const SPORT = 'baseball_mlb';
        const REGIONS = 'us';
        const MARKETS = 'h2h,spreads';
        const ODDS_FORMAT = 'american';

        const CACHE_JUEGOS = 'sipa_cache_juegos_v2';
        const CACHE_TIEMPO = 'sipa_cache_timestamp_v2';
        const REGISTRO_PREDICCIONES = 'sipa_sistema_predictions_v2';

        document.addEventListener('DOMContentLoaded', function() {
            iniciarSistema();
        });

        async function iniciarSistema() {
            try {
                const cacheStr = localStorage.getItem(CACHE_JUEGOS);
                const timestamp = localStorage.getItem(CACHE_TIEMPO);
                const ahora = new Date().getTime();

                let cacheValido = false;
                let partidosGuardados = null;

                if (cacheStr && timestamp && (ahora - timestamp < 4 * 60 * 60 * 1000)) {
                    try {
                        partidosGuardados = JSON.parse(cacheStr);
                        cacheValido = true;
                    } catch (e) {
                        cacheValido = false;
                    }
                }

                if (cacheValido && partidosGuardados) {
                    procesarPartidos(partidosGuardados);
                    verificarResultados();
                } else {
                    await descargarDatos();
                }
                
                actualizarDashboard();
            } catch (error) {
                mostrarFalloSistema("Error al arrancar: " + error.message);
            }
        }

        async function forzarLimpiezaCompleta() {
            const contenedor = document.getElementById('contenedor-pizarra');
            contenedor.innerHTML = '<p class="no-data">Sincronizando con los servidores...</p>';
            localStorage.removeItem(CACHE_JUEGOS);
            localStorage.removeItem(CACHE_TIEMPO);
            await descargarDatos();
            actualizarDashboard();
        }

        async function descargarDatos() {
            const url = `https://api.the-odds-api.com/v4/sports/${SPORT}/odds/?apiKey=${API_KEY}&regions=${REGIONS}&markets=${MARKETS}&oddsFormat=${ODDS_FORMAT}`;
            
            try {
                const respuesta = await fetch(url);
                if (!respuesta.ok) {
                    const datosError = await respuesta.json();
                    throw new Error(datosError.message || "Error en la conexión con la API de apuestas.");
                }
                const partidos = await respuesta.json();

                if (!partidos || partidos.length === 0) {
                    document.getElementById('contenedor-pizarra').innerHTML = '<p class="no-data">No hay juegos listados para hoy.</p>';
                    return;
                }

                localStorage.setItem(CACHE_JUEGOS, JSON.stringify(partidos));
                localStorage.setItem(CACHE_TIEMPO, new Date().getTime().toString());
                
                procesarPartidos(partidos);
                await verificarResultados();
            } catch (error) {
                mostrarFalloSistema(error.message);
            }
        }

        function procesarPartidos(partidos) {
            const contenedor = document.getElementById('contenedor-pizarra');
            contenedor.innerHTML = '';

            let prediccionesStr = localStorage.getItem(REGISTRO_PREDICCIONES);
            let historialPredicciones = prediccionesStr ? JSON.parse(prediccionesStr) : [];
            let contadorEncontrados = 0;

            for (let i = 0; i < partidos.length; i++) {
                let partido = partidos[i];

                if (!partido.bookmakers || partido.bookmakers.length === 0) continue;
                
                let bookmaker = partido.bookmakers.find(b => b.key === 'draftkings');
                if (!bookmaker) bookmaker = partido.bookmakers[0];

                if (!bookmaker || !bookmaker.markets) continue;

                let opciones = [];

                let h2h = bookmaker.markets.find(m => m.key === 'h2h');
                if (h2h && h2h.outcomes) {
                    for (let j = 0; j < h2h.outcomes.length; j++) {
                        let out = h2h.outcomes[j];
                        if (out.price < 0) {
                            opciones.push({ market: 'h2h', name: out.name, price: out.price, point: '' });
                        }
                    }
                }

                if (opciones.length === 0) continue;

                // Ordenar para buscar el más seguro (el número negativo más grande, ej: -200 es mejor que -110)
                opciones.sort((a, b) => a.price - b.price);
                let logroSeleccionado = opciones[0];

                contadorEncontrados++;

                let existe = false;
                for (let k = 0; k < historialPredicciones.length; k++) {
                    if (historialPredicciones[k].gameId === partido.id) {
                        existe = true;
                        break;
                    }
                }

                if (!existe) {
                    historialPredicciones.push({
                        gameId: partido.id,
                        market: logroSeleccionado.market,
                        selection: logroSeleccionado.name,
                        point: logroSeleccionado.point,
                        status: 'pendiente'
                    });
                }

                let fechaObj = new Date(partido.commence_time);
                let horaFormateada = fechaObj.getHours() + ':' + (fechaObj.getMinutes() < 10 ? '0' : '') + fechaObj.getMinutes();

                let signoCuota = logroSeleccionado.price > 0 ? '+' : '';
                let signoPunto = logroSeleccionado.point > 0 ? '+' : '';
                let textoPunto = logroSeleccionado.point !== '' ? ' ' + signoPunto + logroSeleccionado.point : '';

                let htmlTarjeta = `
                    <div class="card-juego">
                        <div class="card-header">
                            <span class="badge-sistema">SELECCIÓN IA</span>
                            <span>${horaFormateada}</span>
                        </div>
                        <div class="duelo-equipos">
                            <div>⚾ ${partido.away_team}</div>
                            <div>🏠 ${partido.home_team}</div>
                        </div>
                        <div class="bloque-sugerencia-automatica">
                            <div class="info-sugerencia">
                                <span class="tag-tipo-logro">GANA DIRECTO (ML)</span>
                                <span class="seleccion-texto">${logroSeleccionado.name}${textoPunto}</span>
                            </div>
                            <div class="cuota-valor">${signoCuota}${logroSeleccionado.price}</div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += htmlTarjeta;
            }

            if (contadorEncontrados === 0) {
                contenedor.innerHTML = '<p class="no-data">Analizando los datos disponibles: No se encontraron cuotas seguras en este momento.</p>';
            }

            localStorage.setItem(REGISTRO_PREDICCIONES, JSON.stringify(historialPredicciones));
        }

        async function verificarResultados() {
            let prediccionesStr = localStorage.getItem(REGISTRO_PREDICCIONES);
            if (!prediccionesStr) return;
            
            let predicciones = JSON.parse(prediccionesStr);
            let hayPendientes = false;
            
            for (let i = 0; i < predicciones.length; i++) {
                if (predicciones[i].status === 'pendiente') hayPendientes = true;
            }

            if (!hayPendientes) return;

            let url = `https://api.the-odds-api.com/v4/sports/${SPORT}/scores/?daysFrom=3&apiKey=${API_KEY}`;
            
            try {
                let respuesta = await fetch(url);
                let scores = await respuesta.json();
                let cambios = false;

                if (!Array.isArray(scores)) return;

                for (let i = 0; i < predicciones.length; i++) {
                    let pred = predicciones[i];
                    if (pred.status !== 'pendiente') continue;

                    let juego = scores.find(s => s.id === pred.gameId);
                    if (juego && juego.completed && juego.scores) {
                        
                        let homeData = juego.scores.find(s => s.name === juego.home_team);
                        let awayData = juego.scores.find(s => s.name === juego.away_team);
                        
                        let homeScore = homeData ? parseInt(homeData.score) : 0;
                        let awayScore = awayData ? parseInt(awayData.score) : 0;
                        
                        let ganadorReal = homeScore > awayScore ? juego.home_team : juego.away_team;
                        
                        if (pred.market === 'h2h') {
                            pred.status = (pred.selection === ganadorReal) ? 'ganada' : 'perdida';
                            cambios = true;
                        }
                    }
                }

                if (cambios) {
                    localStorage.setItem(REGISTRO_PREDICCIONES, JSON.stringify(predicciones));
                    actualizarDashboard();
                }
            } catch (e) {
                console.log("No se pudo auditar resultados todavía.");
            }
        }

        function actualizarDashboard() {
            let prediccionesStr = localStorage.getItem(REGISTRO_PREDICCIONES);
            if (!prediccionesStr) return;

            let historial = JSON.parse(prediccionesStr);
            let total = 0;
            let ganadas = 0;

            for (let i = 0; i < historial.length; i++) {
                if (historial[i].status !== 'pendiente') {
                    total++;
                    if (historial[i].status === 'ganada') ganadas++;
                }
            }

            let porcentaje = total > 0 ? Math.round((ganadas / total) * 100) : 0;

            document.getElementById('global-winrate').innerText = porcentaje + '%';
            document.getElementById('global-conteo').innerText = ganadas + ' Acertadas / ' + total + ' Evaluadas';
        }

        function mostrarFalloSistema(mensajeError) {
            document.getElementById('contenedor-pizarra').innerHTML = `
                <div class="error-texto">
                    <strong>⚠️ ERROR DEL SISTEMA:</strong><br><br>
                    ${mensajeError}<br><br>
                    Verifica tus créditos en The Odds API.
                </div>
            `;
        }
    </script>
</body>
</html>
